########################## NETWORKS

networks:
  docweb:
    name: docweb
    external: true

########################### LOADED IN SERPBEAR

# secrets:

########################### SECRETS REFERENCE
services:
########################### APPS

  dbt-dev:
    build: .
    container_name: dbt_bigquery
    hostname: dbt_bigquery
    restart: unless-stopped
    volumes:
      - type: bind
        source: .
        target: /usr/app/dbt_project
      # Mount local gcloud config for ADC (Application Default Credentials)
      - ${HOME}/.config/gcloud:/root/.config/gcloud
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ='America/Los_Angeles'
    networks:
      - docweb
    healthcheck: 
      test: ["CMD", "dbt", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dbt-mcp:
    image: python:3.12-slim
    container_name: dbt_mcp_server
    hostname: dbt_mcp_server
    restart: unless-stopped
    networks:
      - docweb
    depends_on:
      - dbt-dev
    volumes:
      - type: bind
        source: .
        target: /usr/app/dbt_project
    environment:
      - DBT_PROJECT_DIR=/usr/app/dbt_project
      - DBT_PROFILES_DIR=/usr/app/dbt_project
      - DBT_PATH=/usr/local/bin/dbt
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    command: >
      sh -c "pip install dbt-mcp uv && uvx dbt-mcp"
    env_file: .env
    healthcheck: 
      test: ["CMD", "dbt", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"